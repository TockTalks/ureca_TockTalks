spring:
  application:
    name: talktocks

  datasource:
    url: jdbc:mysql://localhost:3307/talktocks?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: talktocks
    password: talktocks
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 개발 초기엔 update로 바꿔서 편하게 써도 됨
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: change-this-secret-key-before-deploy
  access-token-expire-ms: 3600000      # 1시간
  refresh-token-expire-ms: 1209600000  # 14일

# 외부 시세 API (한국투자증권 / 업비트 등) - 발급받은 키로 교체
external-api:
  stock:
    app-key: ${STOCK_API_APP_KEY:}
    app-secret: ${STOCK_API_APP_SECRET:}
  oauth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      redirect-uri: ${KAKAO_REDIRECT_URI:}

logging:
  level:
    com.talktocks: DEBUG
