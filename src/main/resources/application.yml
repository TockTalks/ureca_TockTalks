spring:
  application:
    name: tocktalks

  task:
    scheduling:
      pool:
        size: 5

  datasource:
    url: jdbc:mysql://localhost:3307/tocktalks?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: tocktalks
    password: tocktalks
    driver-class-name: com.mysql.cj.jdbc.Driver
# hello world!
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  room:
    default-seed-money: 10000000  # 1천만원
  login-attempt:
    max-attempts: 5
    lock-duration-ms: 300000  # 5분
# 허접들아 나 왔다감
# ??? : 모를걸요 ?
jwt:
  secret: change-this-secret-key-before-deploy
  access-token-expire-ms: 3600000      # 1시간
  refresh-token-expire-ms: 1209600000  # 14일

# 외부 시세 API (한국투자증권 / 업비트 등) - 발급받은 키로 교체
external-api:
  stock:
    app-key: ${STOCK_API_APP_KEY:}
    app-secret: ${STOCK_API_APP_SECRET:}
    rest-base-url: ${STOCK_API_REST_BASE_URL:}
    websocket-url: ${STOCK_API_WEBSOCKET_URL:}
  oauth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:}
logging:
  level:
    com.tocktalks: INFO
    org.hibernate: warn